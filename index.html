<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JakTransit — Cari Rute</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--bg:#0d0f14;--surface:#161920;--surface2:#1e2230;--border:#2a2f3f;--accent:#e8f03c;--accent2:#3ce8b4;--text:#e8eaf0;--muted:#6b7494;--danger:#ff4757}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--accent)}
.logo span{color:var(--muted);font-weight:400}
.stat{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;border:1px solid var(--border);padding:2px 7px;border-radius:4px}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:320px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.si{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.si::-webkit-scrollbar{width:3px}
.si::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.iw{position:relative}
.iw input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 10px 9px 30px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.iw input:focus{border-color:var(--accent)}
.iw input::placeholder{color:var(--muted)}
.ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none}
.ac{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:7px;max-height:200px;overflow-y:auto;z-index:9999;display:none}
.ac.open{display:block}
.ac::-webkit-scrollbar{width:3px}
.ac::-webkit-scrollbar-thumb{background:var(--border)}
.aci{padding:7px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.aci:last-child{border-bottom:none}
.aci:hover,.aci.sel{background:var(--border)}
.aci .sid{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);flex-shrink:0}
.frow{display:flex;gap:6px}
.fb{flex:1;padding:6px 4px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .15s}
.fb:hover{border-color:var(--text);color:var(--text)}
.fb.a-all{border-color:var(--accent);color:var(--accent);background:#e8f03c12}
.fb.a-brt{border-color:#D62126;color:#ff7070;background:#D6212612}
.fb.a-jak{border-color:#00609C;color:#4a9eff;background:#00609C12}
.fb.a-oth{border-color:var(--accent2);color:var(--accent2);background:#3ce8b412}
.sbtn{width:100%;padding:10px;background:var(--accent);color:#0d0f14;border:none;border-radius:7px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.sbtn:hover{background:#f0f84a;transform:translateY(-1px)}
.div{height:1px;background:var(--border)}
.empty{text-align:center;padding:24px 12px;color:var(--muted);font-size:12px;line-height:1.8}
.empty .e{font-size:26px;display:block;margin-bottom:8px}
.rc{background:var(--surface2);border:1px solid var(--border);border-radius:9px;overflow:hidden;cursor:pointer;transition:border-color .15s;margin-bottom:6px}
.rc:hover,.rc.active{border-color:var(--accent)}
.rch{padding:9px 11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rb{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
.rb.brt{background:#D6212620;color:#ff7070;border:1px solid #D62126}
.rb.jak{background:#00609C20;color:#5ab0ff;border:1px solid #00609C}
.rb.aui{background:#2255aa20;color:#88aaff;border:1px solid #2255aa}
.rb.oth{background:#3ce8b420;color:var(--accent2);border:1px solid var(--accent2)}
.xb{font-size:10px;font-family:'Space Mono',monospace;padding:2px 6px;border-radius:4px;background:#ffffff10;color:var(--muted)}
.rcb{padding:0 11px 10px}
.jrn{display:flex;flex-direction:column}
.js{display:flex;align-items:flex-start;gap:9px;padding:3px 0;position:relative}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;position:relative;z-index:1}
.dot.ori{background:var(--accent)}
.dot.dst{background:var(--danger)}
.dot.trf{background:var(--accent2)}
.ln{position:absolute;left:3px;top:12px;bottom:-3px;width:1px;background:var(--border)}
.st{flex:1;font-size:11px;line-height:1.5}
.st .sn{font-weight:500}
.st .sr{color:var(--muted);font-size:10px}
#map{flex:1;background:#0a0c10}
@media(max-width:600px){.sidebar{width:100%;min-width:unset;max-height:55vh}.main{flex-direction:column}#map{min-height:45vh}}
</style>
</head>
<body>
<header>
  <div class="logo">JakTransit <span>/ route finder</span></div>
  <div class="stat" id="stat">Loading...</div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="si">
      <div>
        <div class="lbl">Halte Asal</div>
        <div class="iw" id="wF">
          <span class="ico">🟢</span>
          <input type="text" id="iF" placeholder="Ketik nama halte..." autocomplete="off">
        </div>
      </div>
      <div>
        <div class="lbl">Halte Tujuan</div>
        <div class="iw" id="wT">
          <span class="ico">🔴</span>
          <input type="text" id="iT" placeholder="Ketik nama halte..." autocomplete="off">
        </div>
      </div>
      <div>
        <div class="lbl">Filter Moda</div>
        <div class="frow">
          <button class="fb a-all" id="fAll" onclick="setF('all')">Semua</button>
          <button class="fb" id="fBRT" onclick="setF('brt')">BRT</button>
          <button class="fb" id="fJak" onclick="setF('jak')">Mikrotrans</button>
          <button class="fb" id="fOth" onclick="setF('oth')">Lainnya</button>
        </div>
      </div>
      <button class="sbtn" onclick="doSearch()">CARI RUTE →</button>
      <div class="div"></div>
      <div id="res"><div class="empty"><span class="e">🗺️</span>Masukkan halte asal &amp; tujuan</div></div>
    </div>
  </div>
  <div id="map"></div>
</div>

<!-- GTFS DATA — embedded as JSON, parsed safely -->



<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" onload="initMap()"></script>
<script>
  let G = null, stopList = [], map, mL, rL;
  let shapesLoaded = false;

  function ensureShapes() {
    if (shapesLoaded || !G) return;
    shapesLoaded = true;
    fetch('gtfs-shapes.json')
      .then(r => r.json())
      .then(data => { G.shapes = data; });
  }

  function setStatus(msg, ready) {
    const el = document.getElementById('stat');
    el.textContent = msg;
    el.style.borderColor = ready ? 'var(--accent2)' : 'var(--border)';
    el.style.color = ready ? 'var(--accent2)' : 'var(--muted)';
  }

  // Load main data on page load
  setStatus('Loading...', false);
  fetch('gtfs-main.json')
    .then(r => r.json())
    .then(data => {
      G = data;
      G.shapes = null;
      stopList = Object.entries(G.stops).map(([id,s])=>({id,n:s.n})).sort((a,b)=>a.n.localeCompare(b.n));
      setStatus(Object.keys(G.stops).length.toLocaleString() + ' halte · ' + Object.keys(G.routes).length + ' rute', true);
    })
    .catch(() => setStatus('Gagal load data', false));

  // State — outer scope so setF/doSearch can access immediately
  let selF=null, selT=null, filt='all';
  let acI={f:-1,t:-1};

  function initMap() {
    map = L.map('map',{zoomControl:true}).setView([-6.2088,106.8456],11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
    }).addTo(map);
    mL = L.layerGroup().addTo(map);
    rL = L.layerGroup().addTo(map);

  // ── AUTOCOMPLETE ──────────────────────────────────────────────────────────
  function setupAC(which) {
    const inp = document.getElementById(which==='f'?'iF':'iT');
    const list = document.getElementById(which==='f'?'acF':'acT');
    const wrap = document.getElementById(which==='f'?'wF':'wT');

    inp.addEventListener('input', () => {
      const q = inp.value.trim().toLowerCase();
      acI[which] = -1;
      if (q.length < 2) { list.classList.remove('open'); list.innerHTML=''; return; }
      const hits = stopList.filter(s=>s.n.toLowerCase().includes(q)).slice(0,40);
      if (!hits.length) { list.classList.remove('open'); list.innerHTML=''; return; }
      list.innerHTML = hits.map(s => {
        const name = s.n.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return '<div class="aci" data-id="'+s.id+'" data-name="'+name.replace(/"/g,'&quot;')+'"><span>'+name+'</span><span class="sid">'+s.id+'</span></div>';
      }).join('');
      // Position dropdown — render ABOVE input so keyboard doesn't hide it
      const rect = inp.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      const spaceAbove = rect.top;
      const maxH = Math.min(200, Math.max(spaceAbove, spaceBelow) - 8);
      list.style.maxHeight = maxH + 'px';
      list.style.left = rect.left + 'px';
      list.style.width = rect.width + 'px';
      if (spaceAbove > spaceBelow) {
        // More space above — render above input
        list.style.top = '';
        list.style.bottom = (window.innerHeight - rect.top) + 'px';
      } else {
        list.style.bottom = '';
        list.style.top = rect.bottom + 'px';
      }
      list.classList.add('open');
      list.querySelectorAll('.aci').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          e.stopPropagation();
          pickStop(which, el.dataset.id, el.dataset.name);
        });
      });
    });

    inp.addEventListener('keydown', e => {
      const items = list.querySelectorAll('.aci');
      if (!items.length) return;
      if (e.key==='ArrowDown'){e.preventDefault();acI[which]=Math.min(acI[which]+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('sel',i===acI[which]))}
      else if (e.key==='ArrowUp'){e.preventDefault();acI[which]=Math.max(acI[which]-1,0);items.forEach((el,i)=>el.classList.toggle('sel',i===acI[which]))}
      else if (e.key==='Enter'&&acI[which]>=0){items[acI[which]].dispatchEvent(new MouseEvent('mousedown'))}
      else if (e.key==='Escape'){list.classList.remove('open')}
    });
  }
  setupAC('f'); setupAC('t');


  document.addEventListener('mousedown', e => {
    const acF = document.getElementById('acF');
    const acT = document.getElementById('acT');
    if (!e.target.closest('#wF') && !e.target.closest('#acF')) acF.classList.remove('open');
    if (!e.target.closest('#wT') && !e.target.closest('#acT')) acT.classList.remove('open');
  });

  function pickStop(w, id, name) {
    if (w==='f'){selF=id;document.getElementById('iF').value=name;document.getElementById('acF').classList.remove('open')}
    else{selT=id;document.getElementById('iT').value=name;document.getElementById('acT').classList.remove('open')}
  }

}

  // ── FILTER ────────────────────────────────────────────────────────────────
  function setF(f) {
    filt = f;
    document.getElementById('fAll').className='fb'+(f==='all'?' a-all':'');
    document.getElementById('fBRT').className='fb'+(f==='brt'?' a-brt':'');
    document.getElementById('fJak').className='fb'+(f==='jak'?' a-jak':'');
    document.getElementById('fOth').className='fb'+(f==='oth'?' a-oth':'');
  };

  // ── BFS ───────────────────────────────────────────────────────────────────
  const FDESCS = {
    all:null,
    brt:['BRT'],
    jak:['Mikrotrans'],
    oth:['Angkutan Umum Integrasi','Royaltrans','Transjabodetabek','Rusun','Shuttle','Bus Wisata']
  };

  function findRoutes(from, to, f) {
    const allowed = FDESCS[f];
    function ok(rid){ if(!allowed)return true; return allowed.includes(G.routes[rid]?.desc||''); }
    const q=[{stop:from,path:[],xf:0,cur:null}];
    const vis=new Map();
    const res=[];
    while(q.length && res.length<6){
      const c=q.shift();
      if(c.stop===to){res.push({path:c.path,xf:c.xf});continue}
      const vk=c.stop+':'+c.cur;
      if(vis.has(vk)&&vis.get(vk)<=c.xf)continue;
      vis.set(vk,c.xf);
      for(const [ns,nr] of (G.graph[c.stop]||[])){
        if(!G.stops[ns]||!ok(nr))continue;
        const isX=c.cur&&c.cur!==nr;
        const nx=c.xf+(isX?1:0);
        if(nx>3)continue;
        q.push({stop:ns,path:[...c.path,{stop:ns,route:nr,isX}],xf:nx,cur:nr});
      }
    }
    res.sort((a,b)=>a.xf-b.xf||a.path.length-b.path.length);
    const seen=new Set();
    return res.filter(r=>{
      const k=[...new Set(r.path.map(s=>s.route))].join(',');
      if(seen.has(k))return false;seen.add(k);return true;
    });
  }

  // ── SEARCH ────────────────────────────────────────────────────────────────
  function doSearch() {
    if(!G){alert('Data masih loading, tunggu sebentar');return}
    if(!selF||!selT){alert('Pilih halte asal dan tujuan');return}
    if(selF===selT){alert('Halte asal dan tujuan sama');return}
    document.getElementById('res').innerHTML='<div class="empty"><span class="e">⏳</span>Mencari...</div>';
    setTimeout(()=>{
      const results = findRoutes(selF, selT, filt);
      renderResults(results);
    }, 30);
  };

  // ── RENDER ────────────────────────────────────────────────────────────────
  function dcls(desc){
    if(desc==='BRT')return 'brt';
    if(desc==='Mikrotrans')return 'jak';
    if(desc==='Angkutan Umum Integrasi')return 'aui';
    return 'oth';
  }

  function renderResults(results) {
    const el = document.getElementById('res');
    if(!results.length){
      el.innerHTML='<div class="empty"><span class="e">😔</span>Tidak ditemukan rute.<br><small>Coba halte yang lebih besar atau ubah filter.</small></div>';
      return;
    }
    el.innerHTML='<div class="lbl">'+results.length+' rute ditemukan</div>';
    results.forEach((r,i) => {
      const card = buildCard(r);
      el.appendChild(card);
      if(i===0){ card.classList.add('active'); showOnMap(r); }
    });
  }

  function buildCard(result) {
    const card = document.createElement('div');
    card.className = 'rc';
    const rids = [...new Set(result.path.map(s=>s.route))];
    const segs=[]; let cur=null;
    for(const step of result.path){
      if(!cur||cur.r!==step.route){if(cur)segs.push(cur);cur={r:step.route,stops:[]}}
      cur.stops.push(step.stop);
    }
    if(cur)segs.push(cur);

    const badges = rids.map(rid=>{
      const ro=G.routes[rid];
      return '<span class="rb '+dcls(ro?.desc||'')+'">'+escH(ro?.sn||rid)+'</span>';
    }).join(' ');

    const xLabel = result.xf===0?'Langsung':result.xf+'x transfer';
    let steps = jStep('ori', G.stops[selF]?.n||selF, null, true);
    segs.forEach((seg,si)=>{
      const ro=G.routes[seg.r];
      const isLast=si===segs.length-1;
      if(si===0) steps+=jStep('trf', escH(ro?.ln||seg.r), seg.stops.length+' halte · '+(ro?.desc||''), !isLast);
      else {
        const at=G.stops[seg.stops[0]];
        steps+=jStep('trf','Transfer → '+escH(ro?.ln||seg.r),'di '+escH(at?.n||seg.stops[0])+' · '+seg.stops.length+' halte',!isLast);
      }
    });
    steps += jStep('dst', escH(G.stops[selT]?.n||selT), null, false);

    card.innerHTML =
      '<div class="rch">'+badges+'<span class="xb">'+xLabel+'</span></div>'+
      '<div class="rcb"><div class="jrn">'+steps+'</div></div>';

    card.addEventListener('click', () => {
      document.querySelectorAll('.rc').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
      showOnMap(result);
    });
    return card;
  }

  function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function jStep(type,main,sub,hasLine){
    return '<div class="js">'+
      '<div style="position:relative;display:flex;flex-direction:column;align-items:center">'+
      '<div class="dot '+type+'"></div>'+
      (hasLine?'<div class="ln"></div>':'')+
      '</div>'+
      '<div class="st"><div class="sn">'+main+'</div>'+(sub?'<div class="sr">'+sub+'</div>':'')+
      '</div></div>';
  }

  // ── MAP ───────────────────────────────────────────────────────────────────
  function getColor(rid){ const c=G.routes[rid]?.color; return c?'#'+c:'#e8f03c'; }

  function showOnMap(result) {
    mL.clearLayers(); rL.clearLayers();
    if(!result||!result.path.length) return;
    ensureShapes(); // lazy load shapes on first map render
    const rids=[...new Set(result.path.map(s=>s.route))];
    const allCoords=[];
    const drawn=new Set();
    for(const rid of rids){
      if(drawn.has(rid))continue; drawn.add(rid);
      const color=getColor(rid);
      const isJak=(G.routes[rid]?.desc||'')==='Mikrotrans';
      const shapeId=G.routeShape[rid];
      if(shapeId&&G.shapes[shapeId]){
        const coords=G.shapes[shapeId];
        allCoords.push(...coords);
        L.polyline(coords,{color,weight:isJak?3:4,opacity:.85,dashArray:isJak?'8,4':null})
          .bindTooltip(G.routes[rid]?.ln||rid,{sticky:true}).addTo(rL);
      } else {
        const sc=(G.routeStops[rid]||[]).filter(s=>G.stops[s]).map(s=>[G.stops[s].la,G.stops[s].lo]);
        if(sc.length>1){ allCoords.push(...sc); L.polyline(sc,{color,weight:3,opacity:.7,dashArray:'4,4'}).addTo(rL); }
      }
    }
    const fs=G.stops[selF];
    if(fs){ L.circleMarker([fs.la,fs.lo],{radius:9,fillColor:'#e8f03c',color:'#0d0f14',weight:2,fillOpacity:1}).bindPopup('<b>🟢 Asal</b><br>'+escH(fs.n)).addTo(mL); allCoords.push([fs.la,fs.lo]); }
    for(const step of result.path){
      if(step.isX){ const s=G.stops[step.stop]; if(s) L.circleMarker([s.la,s.lo],{radius:7,fillColor:'#3ce8b4',color:'#0d0f14',weight:2,fillOpacity:1}).bindPopup('<b>🔄 Transfer</b><br>'+escH(s.n)).addTo(mL); }
    }
    const ts=G.stops[selT];
    if(ts){ L.circleMarker([ts.la,ts.lo],{radius:9,fillColor:'#ff4757',color:'#0d0f14',weight:2,fillOpacity:1}).bindPopup('<b>🔴 Tujuan</b><br>'+escH(ts.n)).addTo(mL); allCoords.push([ts.la,ts.lo]); }
    if(allCoords.length) map.fitBounds(L.latLngBounds(allCoords).pad(.12));
  }

</script>
<div class="ac" id="acF"></div>
<div class="ac" id="acT"></div>
</body>
</html>
